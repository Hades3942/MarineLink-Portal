services:

  db:
    image: postgres:15
    container_name: marinelink-db
    restart: always
    environment:
      POSTGRES_DB: marinelink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - marinelink-net

  backend:
    build: .
    container_name: marinelink-backend
    restart: always
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://marinelink-db:5432/marinelink
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: MARINELINK_SECRET_KEY
    ports:
      - "8080:8080"
    networks:
      - marinelink-net

volumes:
  db_data:

networks:
  marinelink-net:
